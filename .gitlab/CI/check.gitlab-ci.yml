code-quality:
  stage: check
  except:
    - master
  image: registry.gitlab.com/veloren/veloren-docker-ci/cache/quality:${CACHE_IMAGE_TAG}
  tags: ["saas-linux-medium-amd64"]
  script:
    - cargo clippy --all-targets --locked --all-features -- -D warnings
    - cargo fmt --all -- --check
  allow_failure: true # TODO: Remove
