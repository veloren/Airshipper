unittests:
  stage: build
  except:
    - master
  image: registry.gitlab.com/veloren/veloren-docker-ci/base/linux-x86_64:${CACHE_IMAGE_TAG}
  tags: ["veloren/*", "check"]
  variables:
    GIT_DEPTH: 9999999999999
  script:
    - cargo test --all-features

#linux, windows, macos builds here as template
.tlinux:
  image: registry.gitlab.com/veloren/veloren-docker-ci/base/linux-x86_64:${CACHE_IMAGE_TAG}
  script:
    - cargo build --release -p airshipper --all-features
    - cargo build --release -p airshipper-server --all-features
    - mv target/release/airshipper $CI_PROJECT_DIR
    - mv target/release/airshipper-server $CI_PROJECT_DIR
    - echo LINUX_JOB_ID=$CI_JOB_ID >> linux_job_id.env
  artifacts:
    paths:
      - airshipper
      - airshipper-server
      - LICENSE
    expire_in: 1 week
    reports:
      dotenv: linux_job_id.env

.twindows:
  image: registry.gitlab.com/xvar/veloren/base/windows-x86_64:480e70bc
  script:
    - cargo build --target=x86_64-pc-windows-gnu --release -p airshipper --all-features
    - makensis client/nsis/installer.nsi
    - mv client/nsis/airshipper-windows.exe $CI_PROJECT_DIR
    - echo WINDOWS_JOB_ID=$CI_JOB_ID >> windows_job_id.env
  artifacts:
    paths:
      - airshipper-windows.exe
    expire_in: 1 week
    reports:
        dotenv: windows_job_id.env

.tmacos:
  tags: ["veloren-macos"]
  before_script:
    - source $HOME/.cargo/env
    - cargo --version
    - export DISABLE_GIT_LFS_CHECK=true
    - export RUSTFLAGS="-D warnings"
  script:
    - export MACOSX_DEPLOYMENT_TARGET="10.13"
    - cargo build --release -p airshipper --all-features
    - cargo build --release -p airshipper-server --all-features
    - mv -r target/release/airshipper $CI_PROJECT_DIR
    - mv -r target/release/airshipper-server $CI_PROJECT_DIR
  artifacts:
    paths:
      - airshipper
      - airshipper-server
      - LICENSE
    expire_in: 1 week

.tmacos-aarch64:
  extends:
    - .tmacos
  before_script:
    - export RUST_TARGET="aarch64-apple-darwin"

# Build after merge to master
linux:
  extends:
    - .tlinux
  stage: build
  only:
    - master
  tags: ["veloren/*", "build", "publish", "trusted"]

windows:
  extends:
    - .twindows
  stage: build
  only:
    - master
  tags: ["veloren/*", "build", "publish", "trusted"]

macos-x86_64:
  extends:
    - .tmacos
  stage: build
  only:
    - master
  tags: ["veloren/*:macos", "build", "publish", "trusted"]

macos-aarch64:
  extends:
    - .tmacos-aarch64
  stage: build
  only:
    - master
  tags: ["veloren/*:macos", "build", "publish", "trusted"]

# Optional builds - these are in the check stage even though they're builds to allow building
# the output even if code quality checks fail
.non-master-optional:
  stage: check
  except:
    - master
  when: manual
  allow_failure: true

opt-linux:
  extends:
    - .tlinux
    - .non-master-optional
  tags: ["veloren/*", "build"]

opt-windows:
  extends:
    - .twindows
    - .non-master-optional
  tags: ["veloren/*", "build"]

opt-macos-x86_64:
  extends:
    - .tmacos
    - .non-master-optional
  tags: ["veloren/*:macos", "build"]

opt-macos-aarch64:
  extends:
    - .tmacos-aarch64
    - .non-master-optional
  tags: ["veloren/*:macos", "build"]
